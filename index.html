<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫管理システム - Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-accent: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --secondary: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-base), #020617);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }
        .blob-2 {
            width: 300px;
            height: 300px;
            background: #0ea5e9;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
            transition: color 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-control:focus + .form-label {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Loading Animation */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .btn-text {
            transition: opacity 0.3s;
        }

        .is-loading .btn-text {
            opacity: 0;
        }

        .is-loading .spinner {
            display: block;
        }

        /* Status Message */
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="container">
        <div class="header">
            <h1>Stock Sync</h1>
            <p>スマート在庫管理システム</p>
        </div>

        <form id="inventoryForm">
            <div class="form-group">
                <label class="form-label" for="itemName">品目名</label>
                <input type="text" id="itemName" class="form-control" required placeholder="例: A4コピー用紙">
            </div>

            <div class="form-group">
                <label class="form-label" for="stockIn">入庫数</label>
                <input type="number" id="stockIn" class="form-control" min="0" value="0">
            </div>

            <div class="form-group">
                <label class="form-label" for="stockOut">出庫数</label>
                <input type="number" id="stockOut" class="form-control" min="0" value="0">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">データを送信</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        // ⚠️ GASのWebアプリURL（デプロイ後にここを書き換えてください）
        const GAS_WEB_APP_URL = 'YOUR_GAS_WEB_APP_URL_HERE';

        const form = document.getElementById('inventoryForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validate setup
            if(GAS_WEB_APP_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
                showStatus('GASのWebアプリURLが設定されていません。コードを書き換えてください。', 'error');
                return;
            }

            // Gather data
            const itemName = document.getElementById('itemName').value;
            const stockIn = document.getElementById('stockIn').value;
            const stockOut = document.getElementById('stockOut').value;

            // UI Loading state
            submitBtn.classList.add('is-loading');
            submitBtn.disabled = true;
            statusMessage.classList.remove('show');

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        itemName,
                        stockIn,
                        stockOut
                    }),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    }
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    showStatus(`${itemName}の在庫を更新しました！ (現在庫: ${result.currentStock})`, 'success');
                    form.reset();
                    document.getElementById('stockIn').value = 0;
                    document.getElementById('stockOut').value = 0;
                } else {
                    showStatus('エラーが発生しました: ' + result.message, 'error');
                }

            } catch (error) {
                console.error(error);
                showStatus('送信に失敗しました。設定を確認してください。', 'error');
            } finally {
                submitBtn.classList.remove('is-loading');
                submitBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type} show`;
            
            // Hide after 5 seconds
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
