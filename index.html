<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在庫ダッシュボード</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-accent: #1e293b;
            --primary: #3b82f6;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #020617;
            background-image:
                radial-gradient(at 0% 0%, rgba(30, 27, 75, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
        }

        .dashboard-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .refresh-btn {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card.low-stock::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--danger);
        }

        .item-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e2e8f0;
        }

        .stock-level {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .stock-number {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: var(--primary);
        }

        .card.low-stock .stock-number {
            color: var(--danger);
        }

        .stock-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
        }

        .card.low-stock .badge {
            display: block;
            animation: pulse 2s infinite;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.5) 25%, rgba(51, 65, 85, 0.5) 50%, rgba(30, 41, 59, 0.5) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        .skeleton-title {
            height: 24px;
            width: 60%;
            margin-bottom: 16px;
        }

        .skeleton-number {
            height: 48px;
            width: 40%;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .error-state {
            text-align: center;
            padding: 40px;
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 16px;
            border: 1px dashed rgba(239, 68, 68, 0.3);
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <h1>在庫ダッシュボード</h1>
            <p>現在の在庫状況をリアルタイムに確認</p>
        </div>

        <div class="dashboard-controls">
            <div style="color: var(--text-muted); font-size: 0.9rem;" id="lastUpdateText">
                最終更新: --
            </div>
            <button class="refresh-btn" id="refreshBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                更新
            </button>
        </div>

        <div class="error-state" id="errorState">
            データを取得できませんでした。<br>
            GASのウェブアプリURLが正しく設定されているか確認してください。
        </div>

        <div class="grid" id="inventoryGrid">
            <!-- 初期ローディング用のスケルトンUI -->
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-number"></div>
            </div>
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-number"></div>
            </div>
            <div class="card">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-number"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ GASのWebアプリURL（デプロイ後にここを書き換えてください）
        const GAS_WEB_APP_URL = 'YOUR_GAS_WEB_APP_URL_HERE';

        const grid = document.getElementById('inventoryGrid');
        const refreshBtn = document.getElementById('refreshBtn');
        const lastUpdateText = document.getElementById('lastUpdateText');
        const errorState = document.getElementById('errorState');

        async function fetchStockData() {
            if (GAS_WEB_APP_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
                errorState.style.display = 'block';
                grid.innerHTML = '';
                return;
            }

            refreshBtn.classList.add('spinning');
            errorState.style.display = 'none';

            try {
                // Fetch data from GAS doGet endpoint
                // リダイレクトに対応させるための設定
                const response = await fetch(GAS_WEB_APP_URL, { redirect: 'follow' });
                const result = await response.json();

                if (result.status === 'success') {
                    renderGrid(result.data);

                    const now = new Date();
                    lastUpdateText.textContent = `最終更新: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                errorState.style.display = 'block';
                grid.innerHTML = '';
            } finally {
                refreshBtn.classList.remove('spinning');
            }
        }

        function renderGrid(data) {
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<div style="color:var(--text-muted); padding:20px; grid-column: 1 / -1; text-align: center;">まだ在庫データがありません。<br>Googleフォームからデータを入力してください。</div>';
                return;
            }

            data.forEach((item, index) => {
                const isLowStock = item.stock <= 2;

                const card = document.createElement('div');
                card.className = `card ${isLowStock ? 'low-stock' : ''}`;
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <div class="badge">要発注</div>
                    <div class="item-name">${escapeHTML(item.itemName)}</div>
                    <div class="stock-level">
                        <span class="stock-number">${item.stock}</span>
                        <span class="stock-label">個</span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function escapeHTML(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // イベントリスナー設定
        refreshBtn.addEventListener('click', fetchStockData);

        // 初回読み込み
        fetchStockData();
    </script>
</body>

</html>
